body:
  text: 負暄野録卷上宋陳槱纂總論古今石刻古者金銅等器物其欵識文字皆以胚冶之後鐫刻非若今人就範模中經鑄成者余於武陵郡開元寺鐵塔上見鐫刻經呪之屬皆是冶鑄後為之至於石刻率多用粗頑石又字畫入石處甚深至於及寸其鐫鑿直下往往至底乃反大於面所謂如蠧蟲鑽鏤之形非若後世刻削豐上鋭下似茶藥碾槽狀故古碑之乏也其畫愈肥近世之碑多乏也其畫愈細愈肥而難漫愈細而易滅余在漢上及襄峴間親見魏晉碑刻如此兼石既粗頑自然難壞後世石雖精好然却易剝缺以是知古之人作事不茍皆非今人所能及也秦璽文玉刻古器物銘載此璽文云得於河內向氏家援集古印格所載謂是秦璽按金石録元符中咸陽獲傳國璽初至京師執政以示故將作監李誠誠手自摹印二本以一見遺又蔡絛鐵圍山叢談載元符所得乃漢璽其文曰承天福延萬億永無極九字而此璽文乃曰受命于天既壽永昌二文不同則知趙明誠蓋未嘗見秦璽也按晉書載此璽自漢傳至晉逮永嘉末年璽為石勒所收勒既敗滅璽失所在後戴施得之歸於東晉但其璽文乃云受天之命皇帝壽昌非是舊文矣又歷六朝至隋氏隋之平陳復得舊璽乃更名前者謂曰神璽又傳五代後唐王從珂自焚璽亦毀棄即此則與續刻咸已失之余竊詳二璽各是一物及諸家譜書乃謂通是一璽背面有異文非也二者疑皆魏晉所刻而秦璽不存久矣後有得者蓋非古物近嘉定己卯歲賈涉節制河北申繳到蒙古大將博勒呼獻一璽文曰皇帝恭膺天命之寶篆刻甚得古意然非舊物或謂真廟日天書降後所刻却有此理意者金人自汴京攜至燕山北都既破為䝉古人所得耳槱嘗聞諸老先生議論謂自昔陋儒謂秦璽所在為正統故契丹自謂得傳國璽欲以歸太祖皇帝太祖不受曰吾無秦璽不害為國且亡國之餘何足貴乎契丹畏服聖性髙明持正剛直如此亦可謂度越前古而貽範於方來矣前漢無碑集古目録并金石録所載自秦碑之後凡稱漢碑者悉是後漢其前漢二百年中並無名碑但有金石刻銘識數處耳歐陽公集古目録不載其說第於答劉原父書嘗及之趙明誠云西漢文字世不多有不知何為希罕如此略不可曉然金石録却載有陽朔磚數字故云希罕言不多非妄也余嘗聞之尤梁溪先生袤云西漢碑自昔好古者固嘗旁採博訪片簡隻字搜括無遺竟不之見如陽朔磚要亦非真漢代之碑刻聞是新莽惡稱漢德凡所在有石刻皆令仆而磨之仍嚴其禁不容略留至於秦碑乃更加營護遂得不毀故至今尚有存者梁溪此言蓋有所援據惜不曽再叩之余目記范石湖題北朝項王廟詩有云人間隱事有知音新原闕取秦其事亦爾可發識者一笑近世洪景伯丞相著𨽻釋却有前漢哀帝元壽中郫縣一碑或謂後人僞為者古碑毀壞趙明誠謂所著金石録富於二千卷所載之碑由今觀之信然石刻固非易朽之物其如隨廢興摧毀耶前輩所載元祐中丞相韓玉汝即長安修石橋督責甚峻村民急以應期悉皆磨石刻以代之前人之碑盡矣豫又聞蕭千巖云蔡拱之訪求石碑或蹊田害稼村民深以為苦悉鑱鑿其文字或為柱礎帛砧略不容存留又自亂離而來所在城堡攻戰之處軍兵率取碑鑿為炮石摧毀無餘凡此皆是時所遭遇而其仆壞之門殆非一端蓋亦碑刻之一厄也悲夫樂毅論無錫徐氏家藏樂毅論碑石止存五塊可見者一百八十九字用木匣鐵束甚寶祕之徐氏之上世名縝字君徽者劉公敞原父之妹壻嘗與原父評論石刻始末跋此碑尤詳云樂毅論有二本其一元豐初吳人得其石於太湖水中石缺過半背面皆有刻面十三背亦如之後題永和四年十二月二十四日書賜官奴其上書异僧權即梁朱异徐僧權也其一即周越書苑所載髙紳學士得其餘於秣陵井中者是也凡二十九行石缺一角後兩行只有最下一字至濟字止紳之子安世卒於吳興其家以石質於州民錢氏家當官者每令摹拓錢氏厭之紿為比以失火焚毀矣熙寧中吳中大飢疫趙子立者以金質得之又云舊傳樂毅論乃右軍親書於石其後石入昭陵梁時溫韜得之復傳人間即髙氏本也是褚遂良記貞觀中內出樂毅論真跡令直𢎞文館馮承素摹寫賜長孫無忌等筆勢精妙備盡楷則子立所得髙氏本字亦奇絶非右軍親書于石亦摹真跡而刻之者子立名竦泉南人曽將漕兩浙入為都水使者無子有三女長嫁徐康直字平甫即君徽之子也子立死以石授平甫徐氏再世寶藏尢延之給事袤王順伯大卿厚之皆有題跋尤謂豫嘗親見歐陽公集古所藏髙氏本梅聖俞於碑後白紙闕處題甚妙二字與此卷前一本不同王謂考之集古録髙紳子弟以石質於富人其家失火遂焚其石今無復有本矣趙明誠金石録云集古録謂石焚非也元祐間豫侍親官舍徐州時故郎官趙竦被旨開河吕梁堰挈此石隨行竦沒石遂不知所存蓋歐陽公為錢氏所紿而趙明誠則不知石歸徐氏也又碑有朱异徐僧權押縫者乃梁朝摹刻之本又上有小字云太和六年中勒畢太和唐文宗年號是經唐時再摹刻也字體比徐氏稍肥然極有典刑而此石出太湖時為章氏所得刋二印于末文云申國祕藏及識章淵氏文房印淵字伯深乾道間嘗為江山宰寓居于吳及識之亦爽好事今不知此石存其家否右軍書論右軍書使門生喪心僧辨才殞命昭陵被發咸陽嫗受驅其為世所稱貴而貽害於人也蓋如此篆法總論小篆自李斯之後惟陽冰獨擅其妙常見真跡其字畫起止處皆微露鋒鍔映日觀之中心一縷之處倍濃蓋其用筆有力且直下不欹故鋒常在畫中此蓋其造妙處江南徐鉉書亦爾其源自彼而得其精微者余聞之善書者云古人作篆率用尖筆變通自我此是活法近世鶴山魏明端先生亦用尖筆不愧昔人常見今世作字者率皆束縳筆端限其大小殊不知篆法雖貴字畫齊均然束筆豈復更有神氣山谷云摹篆當隨其喎斜肥瘦與槎牙處皆鐫乃妙若取令平正肥瘦相似補令一槩則蚯蚓筆法也山谷此語真自深識篆法妙處至於槎牙肥瘦惟用尖筆故不能使之必均但世俗若見此字必大哂嫌故善書者往往不得已而狥之耳李陽冰書義興莊元卿家所藏絹本小篆題闡揚儒教四大字各從四尺而約衡五之三畫經二十而一位置得宜頓挫有法發筆處圓若運規而見鋒頴歲久絹質腐敗墨色不漫體勢精彩猶若飛動元卿言其大父少師僖簡公官京師時得之於河內向氏家相傳為李陽冰少監所書雖無題識可考然觀其神氣信所謂如古叉屋漏力有萬夫度非後人所及按陽冰當至德時嘗欲立石經而弗果四字之作安知其不為此而發即此亦可驗其為陽冰書云章友直書建安章伯益友直以小篆著名尤工作古叉體初來京師人有欲從之學書者章曰所謂篆法不可驟為須平居時先將約束用筆輕重及熟於畫方運圓始可下筆其人猶未甚解章乃對之作方圓二圖方為棊盤圓為射帖皆一筆所成其筆畫粗細位置踈密分毫不差且語之曰子姑歸習之能進乎此則篆有餘用不必見吾可也其人方大駭不敢復請問蓋其筆法精熟心手相忘方圓不期自中規矩友直尤工作古文豫嘗見其為信州弋陽縣闕峰記文意髙絶蓋非止以字畫名世也伯益既下世有女適著作佐郎黃元者能嗣其篆法備極精巧嘗書陰符經字皆徑寸勢若飛動伯益姪孫章衡得其本知襄陽日刻于郡齊余嘗得墨本誠可珍玩邵餗書邵居士餗才行俱美髙尚不仕隱居丹陽尤工為叉股篆世所欽重范文正公作釣臺嚴先生祠堂記欲求其書而刻之石專遣錢闕持書懇之余嘗傳得范公之書今録于此書云仲淹書白先生邵公足下仲淹今春與張侍御過丹陽約詣先生維舟湖濵聞先生歸山所謂其室則邇其人甚遠惘然愧薄宦之不髙矣暨抵桐廬郡郡有嚴子陵釣臺思其人詠其風毅然知肥遁之可尚矣能使貪夫廉懦夫立則是大有功于名教也乃作堂而祠之聊以辨子陵之心决千古之疑又念非托之奇人則不足傳於後世今先生篆字出四海誠能枉神筆於片石則子陵之風後千百年未泯其髙尚之為教也亦大矣哉謹遣郡校奉此恭伺雅命觀此書語則其推重邵君亦不薄矣余又於巴陵登嶽陽樓乃滕宗諒子京知郡日所修記亦范文正公所撰蘇舜欽書邵餗篆額時號四絶云近世諸體書余嘗評近衆體書法小篆則有徐明叔及華亭曽大中常熟曽耆年然徐頗好為復古篆體細腰長腳二曽字則圓而勻稍合古意大中尤喜為摹印甚得秦漢章璽氣象𨽻書則有吕勝已黃録杜仲微虞仲房吕杜黃工古法然雖頗徑而其失太拙而短虞間出新意波磔皆長而首尾加大乍見甚爽但稍缺骨法皆不得中行書則有蔣宣卿吳傳朋王逸老單炳文姜堯章張于湖范石湖蔣吳極秀媚所乏者遒徑逸老草法甚熟而間有俗筆單字法本楊少師凝式而微加婉麗姜蓋學單而入室者于湖石湖悉習寶晉而各自變體今世俗於篆則推明叔𨽻則貴仲房行草則取于湖蓋非真識但見其飄逸可喜殊不知皆字體之變雖未盡合古要自各有一種神氣亦足嘉尚人效之者往往但得形似非惟不及且併失其故步良可歎也蔣宣卿書蔣宣卿待制燦紹興中以善書著名因救解嶽侯遂忤秦相諷言者論罷閒廢十年一日忽報有中使至其家時秦尚當國老幼驚惶慮有不測蔣神色不變徐言曰主上聖明吾無大過咎耳既從罷免縱有後命不過符下州郡處分耳亦何至遣中使此必美意不然亦當任之既而中使納謁且傳上旨賜以香茶湯藥宫羅之屬又頒下翰苑所撰憲聖慈烈皇后之弟吳郡王神道碑命蔣書之蔣即奉勑書以授中使而歸憲聖及后族賜賚至數千緡縑帛文房之具蔣久閒頗窘匱賴以少蘇蔣之字畫髙出流輩而髙廟垂情辭翰臣下雖在閒廢中猶不忘如此蔣能不為動容安靜以待其量亦有可取者蔣先時漕江西時先大父嘗為幕屬及其家食嘗間詣荆溪里第訪之親聞其說小王書世稱小王書蓋稱太宗皇帝時王著也本學虞永興書其波致加長體尚嫵媚然全無骨力方上集刋法帖時著預校定識鑒凡淺不無謬誤如列王坦之於逸少諸子間意謂名皆從之殊不知坦之乃王述之子自太原王耳非琅琊族也黃長睿書志及書苑云僧懷仁集右軍書唐文皇製聖教序近世翰林侍書輩學此目曰院體自唐世吳通微兄弟已有斯目今中都習書誥敕者悉規倣著字謂之小王書亦曰院體言翰林所尚也負暄野録卷上
