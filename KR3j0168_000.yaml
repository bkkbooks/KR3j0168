body:
  text: 負暄野録雜家類四雜品之屬提要臣等謹案負暄野録二卷舊本題曰陳槱撰不著時代卷末有至正七年王東跋乃云不知何人所述是當時所見之本未署名也今考書中秦璽一條稱槱嘗聞諸老先生議論則其人名槱無可疑但不知何所據而題為陳姓案閩書陳槱陳幾之孫長樂人紹熙元年進士書中秦璽條内稱嘉定己卯計光宗紹熙元年下距寧宗嘉定己卯首尾僅三十年又西漢碑條内亦稱聞之梁溪尤袤惜不再叩之袤云云亦正當光寧之時疑即此陳槱也其書上卷論石刻及諸家書格下卷論學書之法及紙墨筆研諸事皆源委分明足資考証至所載䑕鬚筆詩一首宋文鑑題為蘇過作其時斜川集尚存必無舛誤而槱稱昨見邵道豫賦鼠鬚筆殊有風度今載于此云云則失考之甚矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:61bba9be61ca1dc0dafce5c8543fa47a008cb135c81aa613c5a02c07ab79f438
