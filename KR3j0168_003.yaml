body:
  text: 負暄野録跋右負暄野録一帙莫知何人所述其發明今古碑刻及翰墨諸法後又附以文房四寶之評蓋博雅之士也先君俾茅雲山草録而不及楷謄遂致紙板散亂至正七年五月初吉梅雨連日因理故書而緝之計其歲月則四十九載矣光隂去速可以慨歎拜手而題於左王東起善敬跋
