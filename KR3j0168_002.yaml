  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0168_WYG_002-1a, image: WYG0871/WYG0871-0038c.png}
body:
  text: 負暄野録卷下宋陳槱纂學書須觀真跡石湖云學書須是收昔人真跡佳妙者可以詳視其先後筆勢輕重往復之法若只看碑本則惟得字畫全不見其筆法神氣終難精進又學時不在旋看字本逐畫臨倣但貴以行立坐卧常諦玩經目著心久之自然有悟入處信意運筆不覺得其精微斯為善學寫大字法古人作大字常藏鋒用力故其字畫從頭至末少有枯燥處今往往多以燥為奇殊不知此本非善書者所貴惟斜拂及率筆令輕處然後有此所謂側筆取妍正蹈書法之所忌也論細字說漢師宜官善書大則徑丈一字細則方寸千言又晉衛巨山論書云其大徑尋細不容髮迫而察之心亂目眩嘗觀東坡題蓮經前注云經七卷如筯粗故其語云卷其盈握沙界已周讀未終篇目力俱廢乃知蝸牛之角可以戰蠻觸棘刺之端可以刻沐猴黃長睿跋細字華嚴經亦云書是經者尺紙作七萬字余謂七卷之軸如筯猶或可書至於尺紙作七萬字誠為難事若以宜官方寸千言槩之已為有餘此說殊不近人情恐决無是理余不敢以為然總論作大小字昔人云作大字要如小字作小字要如大字蓋謂大字則無如小書之詳細曲折小字則終無大字之體格氣勢也刋勒之工仍有善展字不拘字之大小皆可遞展其法以刀鑿去紙存墨就燈傍印之去燈愈近則其形愈大自尺至丈惟意所定然後展紙于壁模勒其影既小大適中且不害體勢亦良法也論筆墨硯硯貴細而潤然細則多不發墨惟細而有鋩鍔方能受墨時所謂如熱尉斗上搨蠟不聞其聲而密相粘滯者斯為上矣墨貴黑光筆貴易熟而耐久然二者每交相為病惟墨能用膠得宜筆能擇毫不茍斯可兼盡其善又硯忌枯爛則易吸水墨忌濡濕則易昏滯筆忌乾捺則毫隨膠折故愛硯之法當以髹匣貯之不惟養潤亦可護塵研墨當旋滴水勿使停積昔人多用硯板不鑿墨池政恐膠久而凝滯也用筆時當先以清水濡毫令稍輕然後循毫理㸃染仍别置洗具用畢隨即滌濯不使留墨則難秃也藏墨當以茶蒻包之又以綿而入於櫝則蒸滃不能入藏筆宜皂角子水調鉛粉蘸上則不生蠧如上諸法留意文翰者皆能知之今漫書示兒輩爾如藏筆墨則髙掛筆墨用木匣懸梁棟間俗論筆墨俗論云善書不擇筆蓋有所本褚河南嘗問虞永興曰吾書孰如歐陽詢虞曰詢不擇紙筆皆得如志君豈得若此裴行儉亦曰褚遂良非精墨佳筆未嘗輒書不擇筆墨而妍捷者余與虞世南耳余謂工不利器而能善事者理所不然不擇而佳要非通論又世俗評墨訣云拈著輕嗅著馨磨著清此亦非真知墨者蓋墨貴重實輕則不堅色貴光黑清則不濃又墨之香者多使松麝好惡初不在此且生蒸腐今其所論皆非佳墨所宜俗輩之見不明其說不可據如此論紙品蘭亭序用鼠鬚筆書烏絲欄繭紙所謂璽紙蓋實絹帛也烏絲欄即是以墨間白識其界行耳布縷為紙今蜀箋猶多用之其紙遇水滴則深作窠臼然者乃爾故薄而清瑩者乃可貴古稱剡藤本以越溪為勝今越之竹紙甲於他處而藤乃獨推撫之清江清江佳處在於堅滑而不留墨新安玉版色理極膩白然質性頗易軟弱今士大夫多糨而後用既光且堅用得其法藏久亦不蒸鬱又吳取越竹以梅天淋水令眼稍乾反復硾之使浮茸去盡筋骨瑩徹是謂春膏其色如蠟若以輕墨作字其光可鑑故其箋近出而遂與蜀産抗衡江南舊稱澄心堂紙劉貢父詩所謂百金售一幅其貴如此今亦有造者然為吳蜀箋所掩遂不盛行於時外國如髙麗闍婆亦皆出紙髙麗紙類蜀中冷金縝實而瑩闍婆者厚而且堅而長者至三四丈髙麗人云抄時使幅端連引故得爾長胡人用作帷幄修齊供則張之滿室若有嘉㑹乃更設花布及罽綺所為者春膏紙詩吳門孫生造春膏紙尤造其妙豫嘗賦詩曰膏潤滋松雨孤髙表竹君夜砧寒搗玉春几瑩鋪雲越地雖呈瑞吳天乃策勳莫言名晚出端可大斯文近觀米南宫有一帖云余嘗硾越州竹光透如金板在油繭上矩截作軸入笈畨復數十張學書作詩寄薛紹彭劉泙云越筠萬杵如金板每用杭油與池繭髙壓巴郡烏絲欄平欺澤國清華練老無他物適心目天使殘年同筆硯圖書滿室翰墨香劉薛何時眼中見薛和之云書便瑩滑如碑版古來精紙惟聞繭杵成刻竹光凌亂何用區區書素練細分濃淡可評墨副以溪巖難試硯世傳此語誰復知千里同風未相見以此觀之則其擅美蓋可見矣紙分陰陽面凡紙皆以澆處向上為陽著簾處向下為陰今人多為面陽而背陰蓋以陽面雖粗而光滑不凝滯陰背雖細而艱澀能沁墨故也然太滑又易失用筆之意太澀又推筆不行惟今之漬汗及越竹紙其陰面細而不澀用以作字筆法具存其陽面則光滑太甚筆鋒未到而墨已先馳似過於駿快也論筆料韓昌黎毛頴傳是知筆以兔頴為正然兔有南北之殊南兔毫短而軟北兔毫長而徑生背領者其白如雪霜北毫作筆極有力然純用北毫雖健且耐久其失也不婉用南毫雖入手易熟其失也弱而易乏善為筆者但以北毫束心而以南毫為副外則又有霜白覆之斯能兼盡其美矣古人或用狸毛鼠鬚今都下亦有製此筆者大抵只是於兔毫中入數莖同東問之者云但可以助力且作觀美然不可多用多用則太粗澀閩廣間有用雞羽鴈翎等為筆余嘗用之究甚軟弱無取殆亦求奇之過酉陽雜俎載南朝有姥善束筆心用胎髮蕭子雲嘗用之自是取其軟此法今不復見於用吳俗近日却有用竹絲者往往以法揉製使就揮染或謂是茗枝而冒稱竹絲江西亦有緝竹為輕絺者疑未必不可為此也二毫筆歐陽通以狸毛為筆以兔毫覆之此二毫筆之所由始也羊以合兔盛於今時蓋不但剛柔得中差宜作字而價廉工省故人所競趨番禺張彥實待制名犯光廟御諱敦嘗為賦詩云包羞不借虎皮蒙筆陳仍推兔作鋒未免吹毛强分别即今同受管城封詠筆詩猩猩毫筆惟山谷詩絶冠名士無不諷詠兹不贅録昨見邵道豫賦鼠鬚筆殊有風度今載於此云太倉失陳紅狡穴得餘腐既興丞相歎又發廷尉怒磔肉飼飢猫分毛雜霜兔插架刀槊便落紙雲烟鶩穿墉一何微託此馳佳譽毫錐名筆世稱筆之鋒短而毫鋭者謂之毫錐蓋本唐白傅詩云有毫鋒鋭君之錐語白自注云時與元微之各有鋒纎細管筆攜以就試相顧輒笑目曰毫錐近世用筆今所在筆工作筆例是尖鋒蓋士子輩編節時文只是用筆端㸃啄於紙上成其字體而已更不顧法度如何故率作此以便求售余乃用筆心作字全使此等筆不得每染一管至於槍秃終不可意嗟乎文既趨時筆亦徇俗苟利成風勢不可挽欲求為印泥畫沙之妙正如䇿蹇驢而追驥騄豈不難哉但鋒齊之筆乃有易秃之患惟良工專務擇毫飽闕有力自然難之論墨法近世言墨法者蓋推吾鄉雪齊趙彥先子覺彥先乃故安定郡王超然居士中表之子也其墨法本無宗承但自少時篤好製造集諸家名方且招延良工無方不試無時不作參合衆技舍短取長積日纍月遂造其妙中興三朝咸見貴重名播遐邇闕無潘李彥先所造墨至多今物故已數十年墨之在人間者亦漸稀少間有藏得數笏者與玉寶同貴彥先亦已嗣王封有子十四人持麾把節亦已大半皆能紹其法然各務從仕鮮復留意餘人得其傳者有郡士黃元功朱知常諸葛武仲唐從之周達先葉茂實及天台陳伯叙琴隱薛道士之徒雖皆頗異常品然較之真雪齊所造要之不及也余與雪齊諸子姪皆宛轉有姻好嘗為余言世俗相傳咸以對膠為奇先公嘗云此大不然若用是法非特堅頑難磨且終不能黑大扺當以十分為率而煤六而膠四乃為中度但取烟貴輕而杵貴多自臻其妙次第泛論大槩如此至其要妙非言之所述也論硯材硯以端溪為最次則洮河又次則古歙又次則劍溪此外如淮安辰溪諸郡雖亦有之然皆不足俎豆其間端歙所産皆有新舊坑之别惟舊坑者為上今已淪為深淵不可復取但聞人間時有收得者亦絶希罕新坑亦間有可采然百不一二端石有眼本非硯之所貴特以此表其真耳故辨之者有活眼死眼之殊活眼凡有數暈黃赤相間所謂鴝鵒眼者乃佳若但純黃或純緑色糢糊不明了者則為死眼此無足取兼多有僞為者須細察之方可見也歙石有四種紋一曰刷絲乃直紋也二曰羅腹乃交羅紋也三曰眉子上有黃黑紋如眉四曰金星狀若灑金此四紋者惟刷絲為上其間復有差等但金星之質最頑不堪用洮石今亦絶少歙之祁門有一種石淡緑色而理細土人以之為假洮石但性極燥故為賤耳劍溪出黯淡灘有石子為之妙甚東坡所謂鳳尾以為出於北苑鳳山之尾今其地初不聞有佳石不知何以稱此廬陵人工造澄泥瓦硯規倣銅雀然其質枯燥又南中人以硨磲琢硯久則拒墨漆硯亦然本取漆匠案卓上自然久積者質堅而鋩利於研磨今人乃施纍漆僞為體虛而滑不可用皆非硯之正材也負暄野録卷下
